<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Artha Interior Designers — Coming Soon</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&family=Cinzel:wght@400;600;700&family=Raleway:wght@200;300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --navy:       #060D1C;
      --navy2:      #091222;
      --navy3:      #0D1A30;
      --gold:       #F0B429;
      --gold2:      #FFD166;
      --gold3:      #E8960C;
      --gold-glow:  rgba(240,180,41,0.25);
      --gold-dim:   rgba(240,180,41,0.5);
      --white:      #FFFDF7;
      --soft:       rgba(255,253,247,0.7);
      --muted:      rgba(255,253,247,0.38);
    }

    html, body { width:100%; }

    body {
      background: var(--navy);
      font-family: 'Raleway', sans-serif;
      color: var(--white);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow-x: hidden;
    }

    /* ── LAYERED BACKGROUND ── */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse 65% 50% at 50% 0%,   rgba(240,180,41,0.18) 0%, transparent 60%),
        radial-gradient(ellipse 40% 35% at 90% 90%,  rgba(240,180,41,0.10) 0%, transparent 55%),
        radial-gradient(ellipse 40% 35% at 5%  80%,  rgba(240,180,41,0.07) 0%, transparent 55%),
        radial-gradient(ellipse 80% 60% at 50% 50%,  #0B1525 0%, #060D1C 100%);
    }

    /* ── ANIMATED GRADIENT SWEEP ── */
    .bg-sweep {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: conic-gradient(from 0deg at 50% 50%,
        transparent 0deg,
        rgba(240,180,41,0.04) 60deg,
        transparent 120deg,
        rgba(240,180,41,0.03) 200deg,
        transparent 260deg
      );
      animation: rotateSweep 18s linear infinite;
    }
    @keyframes rotateSweep {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    /* ── CORNER ORNAMENTS ── */
    .corner {
      position: fixed;
      z-index: 2;
      width: 110px; height: 110px;
    }
    .corner.tl { top:18px; left:18px; }
    .corner.tr { top:18px; right:18px; transform:scaleX(-1); }
    .corner.bl { bottom:18px; left:18px; transform:scaleY(-1); }
    .corner.br { bottom:18px; right:18px; transform:scale(-1,-1); }

    /* ── WRAPPER ── */
    .wrapper {
      position: relative;
      z-index: 3;
      width: 100%;
      max-width: 720px;
      padding: 64px 28px 52px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    /* ── LETTERMARK ── */
    .mark-outer {
      position: relative;
      margin-bottom: 36px;
      animation: dropIn 1s cubic-bezier(0.16,1,0.3,1) both;
    }

    /* pulsing aura */
    .mark-outer::before {
      content:'';
      position:absolute;
      inset:-22px;
      border-radius:50%;
      background: radial-gradient(circle, rgba(240,180,41,0.22) 0%, transparent 70%);
      animation: aura 3s ease-in-out infinite;
    }
    /* spinning dashed ring */
    .mark-outer::after {
      content:'';
      position:absolute;
      inset:-10px;
      border-radius:50%;
      border:1px dashed rgba(240,180,41,0.4);
      animation: spin 14s linear infinite;
    }

    .mark {
      width:168px; height:168px;
      border-radius:50%;
      background: linear-gradient(145deg, #0F1E3A 0%, #162340 50%, #0A1428 100%);
      border:2px solid var(--gold);
      box-shadow:
        0 0 0 4px rgba(240,180,41,0.1),
        0 0 50px rgba(240,180,41,0.28),
        0 0 100px rgba(240,180,41,0.12),
        inset 0 0 30px rgba(240,180,41,0.08),
        0 30px 70px rgba(0,0,0,0.6);
      display:flex;
      align-items:center;
      justify-content:center;
      font-family:'Cinzel', serif;
      font-size:80px;
      font-weight:700;
      color: var(--gold2);
      text-shadow:
        0 0 15px rgba(240,180,41,1),
        0 0 35px rgba(240,180,41,0.7),
        0 0 70px rgba(240,180,41,0.4);
      overflow:hidden;
      animation: float 5s ease-in-out infinite;
      user-select:none;
      position:relative;
      z-index:1;
    }
    .mark::after {
      content:'';
      position:absolute;
      inset:8px;
      border-radius:50%;
      border:1px solid rgba(240,180,41,0.25);
    }

    @keyframes dropIn {
      from { opacity:0; transform:translateY(-30px) scale(0.85); }
      to   { opacity:1; transform:translateY(0) scale(1); }
    }
    @keyframes aura {
      0%,100% { transform:scale(1);    opacity:0.7; }
      50%      { transform:scale(1.12); opacity:1; }
    }
    @keyframes spin {
      from { transform:rotate(0deg); }
      to   { transform:rotate(360deg); }
    }
    @keyframes float {
      0%,100% { transform:translateY(0); }
      50%      { transform:translateY(-12px); }
    }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(20px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* ── PRE LABEL ── */
    .pre-label {
      font-family:'Cinzel', serif;
      font-size:10px;
      letter-spacing:0.55em;
      color: var(--gold-dim);
      text-transform:uppercase;
      margin-bottom:16px;
      animation: fadeUp 1s 0.25s both;
    }

    /* ── ORNAMENT ── */
    .orn {
      display:flex;
      align-items:center;
      gap:12px;
      margin-bottom:20px;
      animation: fadeUp 1s 0.35s both;
    }
    .orn .line {
      width:60px; height:1px;
      background:linear-gradient(90deg, transparent, var(--gold));
    }
    .orn .line.r { background:linear-gradient(90deg, var(--gold), transparent); }
    .orn .gem {
      width:7px; height:7px;
      background:var(--gold);
      transform:rotate(45deg);
      box-shadow:0 0 12px rgba(240,180,41,0.9), 0 0 24px rgba(240,180,41,0.4);
    }

    /* ── BRAND NAME ── */
    .brand {
      font-family:'Cormorant Garamond', serif;
      font-size: clamp(62px, 15vw, 104px);
      font-weight:700;
      letter-spacing:0.06em;
      line-height:1;
      margin-bottom:6px;
      background: linear-gradient(160deg, var(--gold2) 0%, var(--gold) 45%, var(--gold3) 100%);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      background-clip:text;
      filter: drop-shadow(0 0 30px rgba(240,180,41,0.5));
      animation: fadeUp 1s 0.45s both;
    }

    .brand-sub {
      font-family:'Cinzel', serif;
      font-size: clamp(10px, 2.6vw, 14px);
      font-weight:600;
      letter-spacing:0.5em;
      color: var(--soft);
      text-transform:uppercase;
      margin-bottom:14px;
      animation: fadeUp 1s 0.55s both;
    }

    /* ── TAGLINE ── */
    .tagline {
      font-family:'Cormorant Garamond', serif;
      font-size: clamp(19px, 4.5vw, 26px);
      font-style:italic;
      font-weight:400;
      color: var(--gold2);
      letter-spacing:0.06em;
      margin-bottom:42px;
      text-shadow:0 0 20px rgba(240,180,41,0.3);
      animation: fadeUp 1s 0.65s both;
    }

    /* ── COMING SOON ── */
    .badge {
      display:inline-flex;
      align-items:center;
      gap:16px;
      padding:13px 36px;
      border:1px solid var(--gold);
      background: rgba(240,180,41,0.08);
      font-family:'Cinzel', serif;
      font-size:11px;
      letter-spacing:0.5em;
      color: var(--gold2);
      text-transform:uppercase;
      margin-bottom:48px;
      box-shadow:
        0 0 20px rgba(240,180,41,0.12),
        inset 0 0 20px rgba(240,180,41,0.05);
      animation: fadeUp 1s 0.75s both;
    }
    .badge .gem-s {
      width:5px; height:5px;
      background:var(--gold);
      transform:rotate(45deg);
      box-shadow:0 0 8px rgba(240,180,41,0.8);
      flex-shrink:0;
    }

    /* ── DIVIDER ── */
    .div {
      width:100%;
      max-width:360px;
      height:1px;
      background:linear-gradient(90deg, transparent, rgba(240,180,41,0.5), transparent);
      margin-bottom:40px;
      animation: fadeUp 1s 0.8s both;
    }

    /* ── BUTTONS ── */
    .btns {
      display:flex;
      gap:14px;
      flex-wrap:wrap;
      justify-content:center;
      margin-bottom:44px;
      animation: fadeUp 1s 0.88s both;
    }

    .btn {
      display:inline-flex;
      align-items:center;
      gap:10px;
      padding:15px 32px;
      font-family:'Raleway', sans-serif;
      font-size:11px;
      font-weight:500;
      letter-spacing:0.22em;
      text-transform:uppercase;
      text-decoration:none;
      cursor:pointer;
      transition:all 0.3s ease;
    }

    .btn-wa {
      background:var(--gold);
      color:var(--navy);
      border:2px solid var(--gold);
      box-shadow:0 0 20px rgba(240,180,41,0.35), 0 4px 20px rgba(0,0,0,0.3);
      font-weight:600;
    }
    .btn-wa:hover {
      background:var(--gold2);
      border-color:var(--gold2);
      box-shadow:0 0 35px rgba(240,180,41,0.55), 0 8px 30px rgba(0,0,0,0.3);
      transform:translateY(-3px);
    }

    .btn-ig {
      background:transparent;
      color:var(--gold);
      border:1.5px solid var(--gold);
      box-shadow:0 0 12px rgba(240,180,41,0.15);
    }
    .btn-ig:hover {
      background:rgba(240,180,41,0.1);
      box-shadow:0 0 25px rgba(240,180,41,0.3);
      transform:translateY(-3px);
    }

    /* ── INFO ── */
    .info {
      display:flex;
      flex-wrap:wrap;
      gap:14px 28px;
      justify-content:center;
      margin-bottom:36px;
      animation: fadeUp 1s 0.96s both;
    }
    .info-item {
      display:flex;
      align-items:center;
      gap:7px;
      font-size:11px;
      letter-spacing:0.1em;
      color:var(--muted);
      text-decoration:none;
      font-weight:300;
      transition:color 0.25s, text-shadow 0.25s;
    }
    .info-item:hover {
      color:var(--gold2);
      text-shadow:0 0 10px rgba(240,180,41,0.4);
    }
    .info-item svg { flex-shrink:0; opacity:0.7; }

    /* ── COPYRIGHT ── */
    .copy {
      font-size:9.5px;
      letter-spacing:0.22em;
      color:rgba(255,253,247,0.75);
      font-weight:300;
      text-transform:uppercase;
      animation: fadeUp 1s 1.05s both;
    }

    /* ── MOBILE ── */
    @media (max-width:480px) {
      .wrapper { padding:52px 20px 44px; }
      .mark { width:136px; height:136px; font-size:64px; }
      .mark-outer::after { inset:-7px; }
      .mark-outer::before { inset:-16px; }
      .corner { width:64px; height:64px; }
      .corner.tl { top:10px; left:10px; }
      .corner.tr { top:10px; right:10px; }
      .corner.bl { bottom:10px; left:10px; }
      .corner.br { bottom:10px; right:10px; }
      .btns { flex-direction:column; align-items:center; width:100%; }
      .btn { width:100%; max-width:300px; justify-content:center; }
      .orn .line { width:40px; }
      .info { gap:12px 16px; }
    }
  </style>
</head>
